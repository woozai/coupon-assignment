name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/**'
      - 'hotfix/**'
  pull_request:

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
      CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
      JWT_EXPIRES_IN: 1h
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      NODE_ENV: test
      PORT: 4000
      RESELLER_API_KEY: ${{ secrets.RESELLER_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Smoke test backend health route
        working-directory: backend
        shell: bash
        run: |
          npm start > backend.log 2>&1 &
          backend_pid=$!
          trap "kill $backend_pid" EXIT

          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:4000/health > /tmp/backend-health.json; then
              cat /tmp/backend-health.json
              exit 0
            fi
            sleep 2
          done

          cat backend.log
          exit 1

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:4000
        run: npm run build

  docker:
    name: Docker Compose Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create backend env file for compose validation
        shell: bash
        run: |
          cat <<'EOF' > backend/.env
          PORT=4000
          NODE_ENV=production
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD_HASH=${{ secrets.ADMIN_PASSWORD_HASH }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=1h
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
          RESELLER_API_KEY=${{ secrets.RESELLER_API_KEY }}
          EOF

      - name: Validate docker compose file
        run: docker compose config
