services:
  mongo:
    image: mongo:7
    container_name: digital-coupon-marketplace-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: digital-coupon-marketplace
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: digital-coupon-marketplace-backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        format: raw
    environment:
      CORS_ORIGIN: http://localhost:5173
      MONGODB_URI: mongodb://mongo:27017/digital-coupon-marketplace
      NODE_ENV: production
      PORT: 4000
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:4000
    container_name: digital-coupon-marketplace-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:8080"

volumes:
  mongo-data:
